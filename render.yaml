# Render.com deployment configuration
services:
  - type: web
    name: train-seat-exchange-api
    env: python
    region: singapore
    plan: starter
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      pip install -r requirements-postgres.txt
      pip install -r requirements-security.txt
      pip install -r requirements-monitoring.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: train-exchange-db
          property: connectionString
      - key: MSG91_AUTH_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
    healthCheckPath: /health
    
databases:
  - name: train-exchange-db
    plan: starter
    databaseName: train_exchange
    user: trainuser
