# Render.com deployment configuration
services:
  - type: web
    name: train-seat-exchange-api
    env: python
    region: singapore
    plan: starter
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      pip install -r requirements-security.txt
      pip install -r requirements-monitoring.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DB_FOLDER
        value: /opt/render/project/src/backend/data
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: /etc/secrets/firebase-service-account.json
    healthCheckPath: /health

# Attach a persistent disk manually in the Render dashboard.
# Mount path: /opt/render/project/src/backend/data
# Size: 2 GB
