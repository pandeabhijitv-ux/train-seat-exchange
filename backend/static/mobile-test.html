<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>Train Seat Exchange</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        input, select, button {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .success {
            background: #10b981;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .error {
            background: #ef4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
        
        .entry-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .entry-item h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .entry-detail {
            color: #666;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🚂 Train Seat Exchange</h1>
            <p class="subtitle">Mobile Test Interface</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('otp')">Login</div>
            <div class="tab" onclick="switchTab('pnr')">Verify PNR</div>
            <div class="tab" onclick="switchTab('search')">Search</div>
        </div>
        
        <!-- OTP Tab -->
        <div id="otp-tab" class="tab-content active">
            <div class="card">
                <h2 style="font-size: 18px; margin-bottom: 15px;">📱 Phone Verification</h2>
                
                <div id="otp-success" class="success hidden"></div>
                <div id="otp-error" class="error hidden"></div>
                
                <div id="phone-section">
                    <div class="form-group">
                        <label>Phone Number (10 digits)</label>
                        <input type="tel" id="phone" placeholder="9876543210" maxlength="10">
                    </div>
                    <button onclick="sendOTP()">Send OTP</button>
                </div>
                
                <div id="verify-section" class="hidden">
                    <div class="form-group">
                        <label>Enter OTP</label>
                        <input type="text" id="otp" placeholder="123456" maxlength="6">
                    </div>
                    <button onclick="verifyOTP()">Verify OTP</button>
                </div>
            </div>
        </div>
        
        <!-- PNR Verification Tab -->
        <div id="pnr-tab" class="tab-content">
            <div class="card">
                <h2 style="font-size: 18px; margin-bottom: 15px;">🎫 Verify PNR</h2>
                
                <div id="pnr-success" class="success hidden"></div>
                <div id="pnr-error" class="error hidden"></div>
                
                <div class="form-group">
                    <label>PNR Number (10 digits)</label>
                    <input type="text" id="pnr-number" placeholder="1234567890" maxlength="10">
                </div>
                
                <button onclick="verifyPNR()">Verify PNR</button>
            </div>
            
            <div id="pnr-details" class="hidden">
                <div class="card">
                    <h2 style="font-size: 18px; margin-bottom: 15px; color: #10b981;">✅ PNR Verified</h2>
                    <div id="pnr-info"></div>
                </div>
            </div>
        </div>
        
        <!-- Search Tab -->
        <div id="search-tab" class="tab-content">
            <div class="card">
                <h2 style="font-size: 18px; margin-bottom: 15px;">🔍 Search Seats</h2>
                
                <div id="search-error" class="error hidden"></div>
                
                <div class="form-group">
                    <label>Train Number</label>
                    <input type="text" id="train-number" placeholder="12345">
                </div>
                
                <div class="form-group">
                    <label>From Station</label>
        let verifiedPNR = null;
                    <input type="text" id="from-station" placeholder="NDLS">
                </div>
                
                <div class="form-group">
                    <label>To Station</label>
                    <input type="text" id="to-station" placeholder="BCT">
                </div>
                
                <button onclick="searchEntries()">Search</button>
            </div>
            
            <div id="results" class="hidden">
                <div class="card">
                    <h2 style="font-size: 18px; margin-bottom: 15px;">Search Results</h2>
                    <div id="results-list"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin + '/api/v1';
        let currentPhone = '';
        let currentOTP = '';
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        function showMessage(elementId, message, isError = false) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = isError ? 'error' : 'success';
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }
        
        async function sendOTP() {
            const phone = document.getElementById('phone').value;
            
            if (phone.length !== 10) {
                showMessage('otp-error', 'Please enter a valid 10-digit phone number', true);
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/otp/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    currentPhone = phone;
                    document.getElementById('phone-section').classList.add('hidden');
                    document.getElementById('verify-section').classList.remove('hidden');
                    showMessage('otp-success', `OTP sent! Debug OTP: ${data.debug_otp || 'Check SMS'}`);
                } else {
                    showMessage('otp-error', data.detail || 'Failed to send OTP', true);
                }
            } catch (error) {
                showMessage('otp-error', 'Network error. Is the server running?', true);
            }
        }
        
        async function verifyOTP() {
            const otp = document.getElementById('otp').value;
            
            if (otp.length < 4) {
                showMessage('otp-error', 'Please enter the OTP', true);
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/otp/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: currentPhone, otp })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('otp-success', '✅ Phone verified successfully!');
                    setTimeout(() => switchTab('search'), 2000);
                } else {
                    showMessage('otp-error', data.detail || 'Invalid OTP', true);
                }
            } catch (error) {
                showMessage('otp-error', 'Network error', true);
            }
        }
        verifyPNR() {
            const pnr = document.getElementById('pnr-number').value;
            
            if (pnr.length !== 10) {
                showMessage('pnr-error', 'Please enter a valid 10-digit PNR', true);
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/pnr/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pnr })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    verifiedPNR = data;
                    displayPNRDetails(data);
                    showMessage('pnr-success', '✅ PNR verified successfully!');
                } else {
                    showMessage('pnr-error', data.detail || 'PNR verification failed', true);
                }
            } catch (error) {
                showMessage('pnr-error', 'Network error', true);
            }
        }
        
        function displayPNRDetails(pnr) {
            const pnrInfo = document.getElementById('pnr-info');
            const pnrDetails = document.getElementById('pnr-details');
            
            const statusColor = pnr.is_confirmed ? '#10b981' : '#ef4444';
            const statusIcon = pnr.is_confirmed ? '✅' : '⚠️';
            
            pnrInfo.innerHTML = `
                <div style="margin-bottom: 15px; padding: 10px; background: ${statusColor}20; border-radius: 8px; border-left: 4px solid ${statusColor};">
                    <div style="font-weight: 600; color: ${statusColor};">
                        ${statusIcon} Status: ${pnr.status}
                    </div>
                </div>
                <div class="entry-detail"><strong>PNR:</strong> ${pnr.pnr}</div>
                <div class="entry-detail"><strong>Train:</strong> ${pnr.train_number} - ${pnr.train_name}</div>
                <div class="entry-detail"><strong>From:</strong> ${pnr.boarding_station}</div>
                <div class="entry-detail"><strong>To:</strong> ${pnr.destination_station}</div>
                <div class="entry-detail"><strong>Date:</strong> ${pnr.date_of_journey}</div>
                <div class="entry-detail"><strong>Class:</strong> ${pnr.class || 'N/A'}</div>
                <div class="entry-detail"><strong>Seat:</strong> ${pnr.seat_number}</div>
                <div class="entry-detail"><strong>Passenger:</strong> ${pnr.passenger_name}</div>
            `;
            
            pnrDetails.classList.remove('hidden');
        }
        
        async function 
        async function searchEntries() {
            const trainNumber = document.getElementById('train-number').value;
            const fromStation = document.getElementById('from-station').value;
            const toStation = document.getElementById('to-station').value;
            
            if (!trainNumber || !fromStation || !toStation) {
                showMessage('search-error', 'Please fill all fields', true);
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/entry/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        train_number: trainNumber,
                        from_station: fromStation,
                        to_station: toStation
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayResults(data);
                } else {
                    showMessage('search-error', data.detail || 'Search failed', true);
                }
            } catch (error) {
                showMessage('search-error', 'Network error', true);
            }
        }
        
        function displayResults(entries) {
            const resultsList = document.getElementById('results-list');
            const resultsDiv = document.getElementById('results');
            
            if (entries.length === 0) {
                resultsList.innerHTML = '<p style="color: #666; text-align: center;">No entries found</p>';
            } else {
                resultsList.innerHTML = entries.map(entry => `
                    <div class="entry-item">
                        <h3>${entry.train_name}</h3>
                        <div class="entry-detail"><strong>PNR:</strong> ${entry.pnr}</div>
                        <div class="entry-detail"><strong>Current:</strong> ${entry.current_seat}</div>
                        <div class="entry-detail"><strong>Desired:</strong> ${entry.desired_seat}</div>
                        <div class="entry-detail"><strong>Fee:</strong> ₹${entry.exchange_fee}</div>
                    </div>
                `).join('');
            }
            
            resultsDiv.classList.remove('hidden');
        }
        
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed'));
        }
    </script>
</body>
</html>
